<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrimeRoute Marketing</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      text-align: center;
      padding: 30px 20px;
    }
    .wrap {
      max-width: 520px;
      margin: auto;
      background: #121212;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 0 25px rgba(0,0,0,.35);
    }
    h1 {
      color: #d4af37;
      margin-bottom: 10px;
    }
    p {
      color: #ddd;
      line-height: 1.5;
    }
    input, textarea, button, select {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      box-sizing: border-box;
      font-size: 16px;
    }
    input, textarea, select {
      background: #1b1b1b;
      color: #fff;
    }
    button {
      background: #d4af37;
      color: #000;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    button:hover {
      opacity: .95;
    }
    .note {
      font-size: 13px;
      color: #aaa;
      margin-top: 12px;
    }
    #status {
      margin-top: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PrimeRoute Marketing</h1>
    <p>Get more customers with targeted direct mail campaigns built to generate real leads.</p>

    <form id="leadForm">
      <input type="text" id="name" placeholder="Your Name" required />
      <input type="text" id="business" placeholder="Business Name / Type" required />
      <input type="tel" id="phone" placeholder="Phone Number" required />
      <input type="text" id="serviceArea" placeholder="Service Area" />
      <select id="interest">
        <option value="EDDM Campaign">EDDM Campaign</option>
        <option value="Postcard Design">Postcard Design</option>
        <option value="Mailing Routes">Mailing Routes</option>
        <option value="Full Lead Package">Full Lead Package</option>
      </select>
      <textarea id="notes" rows="4" placeholder="What kind of leads do you want?"></textarea>
      <button type="submit">Get More Leads</button>
    </form>

    <div id="status"></div>
    <div class="note">We’ll reach out with the best route and offer setup for your business.</div>
  </div>

  <script>
    const form = document.getElementById("leadForm");
    const statusBox = document.getElementById("status");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      statusBox.textContent = "Sending...";

      const name = document.getElementById("name").value.trim();
      const business = document.getElementById("business").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const serviceArea = document.getElementById("serviceArea").value.trim();
      const interest = document.getElementById("interest").value;
      const notes = document.getElementById("notes").value.trim();

      const message =
`New PrimeRoute lead:
Name: ${name}
Business: ${business}
Phone: ${phone}
Area: ${serviceArea}
Interest: ${interest}
Notes: ${notes}`;

      try {
        const response = await fetch("https://textbelt.com/text", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: new URLSearchParams({
            phone: "YOURNUMBERHERE",
            message: message,
            key: "YOURTEXTBELTKEYHERE"
          })
        });

        const data = await response.json();

        if (data.success) {
          statusBox.textContent = "Lead sent successfully.";
          form.reset();
        } else {
          statusBox.textContent = "SMS failed: " + (data.error || "Unknown error");
        }
      } catch (err) {
        statusBox.textContent = "Something went wrong sending the text.";
      }
    });
  </script>
</body>
</html>
